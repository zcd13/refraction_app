name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust Dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "wgpu-raw -> target"

      - name: Download and Install Trunk
        run: |
          wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
          sudo mv trunk /usr/local/bin/

      - name: Build Application with Trunk
        # Note: We use the absolute sub-path "/refraction_app/" here so paths link properly
        run: cd wgpu-raw && trunk build --release --public-url "https://zcd13.github.io/refraction_app/" && cd ..

      - name: Add .nojekyll File
        # This prevents GitHub Pages from hiding files starting with underscores
        run: touch wgpu-raw/dist/.nojekyll

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: pages
          folder: wgpu-raw/dist
          clean: true
